<!doctype html>
<html lang="ko">
  <head>

        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;

        color: #1c1c1a;
        font-family:
          -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;

        padding: 24px;

    <div class="card">
      <h1>카페인노트</h1>
